  <!-- PWA update banner: shown when a new service worker has installed
       and is waiting to activate. Tapping Reload activates it. -->
  <div id="pwa-update-banner" style="
       display:none; position:fixed; bottom:0; left:0; right:0;
       background:#1565C0; color:#fff; padding:12px 16px; z-index:99999;
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       align-items:center; justify-content:space-between;
       box-shadow:0 -2px 8px rgba(0,0,0,0.4);">
    <span style="font-size:14px;">A new version is available.</span>
    <button id="pwa-reload-btn" style="
        background:#fff; color:#1565C0; border:none; padding:8px 16px;
        border-radius:4px; font-weight:bold; font-size:13px; cursor:pointer;">
      Reload
    </button>
  </div>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      function showBanner(waitingWorker) {
        var banner = document.getElementById('pwa-update-banner');
        var btn = document.getElementById('pwa-reload-btn');
        banner.style.display = 'flex';
        btn.onclick = function () {
          if (waitingWorker) {
            // Flutter SW format: see build/web/flutter_service_worker.js.
            // controllerchange will trigger the reload once it activates.
            waitingWorker.postMessage('skipWaiting');
          } else {
            window.location.reload();
          }
        };
      }

      navigator.serviceWorker.ready.then(function (reg) {
        if (reg.waiting && navigator.serviceWorker.controller) {
          showBanner(reg.waiting);
        }
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showBanner(nw);
            }
          });
        });

        // Force an SW update check whenever the app becomes visible
        // (home-screen PWAs rarely do a full reload on resume) and once
        // per hour for long-lived sessions. Without this, a phone that
        // never closes the PWA will sit on a stale build for days.
        function checkForUpdate() {
          reg.update().catch(function () {});
        }
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') checkForUpdate();
        });
        setInterval(checkForUpdate, 60 * 60 * 1000);
      });

      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    })();
  </script>
